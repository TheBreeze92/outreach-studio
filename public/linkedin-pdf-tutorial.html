  window.addEventListener('error', function(e) {

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

          try {

            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;

      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

:center; gap:7px; flex-wrap:wrap;\">\n            <span>San Francisco Bay Area<\u002Fspan>\n            <span style=\"width:3px; height:3px; border-radius:50%; background:#a7b1ba;\"><\u002Fspan>\n            <span style=\"color:#0a66c2; font-weight:600;\">Contact info<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13px; color:#0a66c2; font-weight:600; margin-top:4px;\">500+ connections<\u002Fdiv>\n\n          <!-- action buttons -->\n          <div style=\"display:flex; align-items:center; gap:8px; margin-top:16px;\">\n            <button style=\"display:inline-flex; align-items:center; gap:5px; height:34px; padding:0 15px; border:none; border-radius:18px; background:#0a66c2; color:#fff; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;\" style-hover=\"background:#004182;\">\n              Open to\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M7 10l5 5 5-5z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <button style=\"display:inline-flex; align-items:center; gap:5px; height:34px; padding:0 15px; border:1.5px solid #0a66c2; border-radius:18px; background:#fff; color:#0a66c2; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;\" style-hover=\"background:#eaf2fb;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0a66c2\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n              Add profile section\n            <\u002Fbutton>\n            <button ref=\"{{ setMoreRef }}\" onclick=\"{{ onMore }}\" style=\"display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 15px; border:1.5px solid #5a6872; border-radius:18px; background:#fff; color:#3a4750; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;\" style-hover=\"background:#eef0f2;\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#3a -2.2M12 16l2.2-2.2\" stroke=\"#d8392b\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            Save to PDF\n          <\u002Fdiv>\n          <!-- share -->\n          <div style=\"display:flex; align-items:center; gap:12px; height:40px; padding:0 10px; border-radius:8px; color:#3a4750; font-size:14px; font-weight:500;\">\n            <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5e6b74\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><path d=\"M8.6 13.5l6.8 4M15.4 6.5l-6.8 4\"><\u002Fpath><\u002Fsvg>\n            Share profile\n          <\u002Fdiv>\n          <!-- follow -->\n          <div style=\"display:flex; align-items:center; gap:12px; height:40px; padding:0 10px; border-radius:8px; color:#3a4750; font-size:14px; font-weight:500;\">\n            <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5e6b74\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"10\" cy=\"8\" r=\"3.4\"><\u002Fcircle><path d=\"M4 20c0-3.3 2.7-5.5 6-5.5M18 8v6M21 11h-6\"><\u002Fpath><\u002Fsvg>\n            Follow\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Success toast -->\n      <sc-if value=\"{{ toastVisible }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; align-items:center; gap:13px; background:#16202a; color:#fff; padding:13px 18px 13px 14px; border-radius:13px; box-shadow:0 16px 34px -10px rgba(0,0,0,0.45); z-index:9;\">\n          <div style=\"position:relative; width:38px; height:38px; flex:0 0 auto;\">\n            <svg width=\"38\" height=\"38\" viewBox=\"0 0 38 38\">\n              <circle cx=\"19\" cy=\"19\" r=\"16\" fill=\"none\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"3\"><\u002Fcircle>\n              <circle cx=\"19\" cy=\"19\" r=\"16\" fill=\"none\" stroke=\"#5fd08a\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-dasharray=\"100.5\" stroke-dashoffset=\"{{ ringOffset }}\" transform=\"rotate(-90 19 19)\" style=\"transition:stroke-dashoffset 1.05s cubic-bezier(.4,0,.2,1);\"><\u002Fcircle>\n            <\u002Fsvg>\n            <sc-if value=\"{{ success }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5fd08a\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute; top:9px; left:9px;\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:14px; font-weight:600;\">{{ toastTitle }}<\u002Fdiv>\n            <div style=\"font-size:12px; color:#aab4be; margin-top:1px;\">Jordan-Avery-Profile.pdf<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Cursor -->\n      <div style=\"position:absolute; top:0; left:0; pointer-events:none; z-index:20; opacity:{{ cursorOpacity }}; transform:translate({{ cx }}px,{{ cy }}px); transition:transform 0.85s cubic-bezier(.45,.05,.2,1), opacity 0.3s ease;\">\n        <div style=\"transform:scale({{ cursorScale }}); transition:transform 0.12s ease;\">\n          <svg width=\"27\" height=\"27\" viewBox=\"0 0 24 24\" style=\"display:block; filter:drop-shadow(0 3px 4px rgba(0,0,0,0.32)); transform:translate(-4px,-2px);\">\n            <path d=\"M5.5 2.4 L5.5 18.6 L9.7 14.6 L12.5 21 L15.1 19.85 L12.3 13.7 L18.1 13.5 Z\" fill=\"#ffffff\" stroke=\"#16202a\" stroke-width=\"1.3\" stroke-linejoin=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Status line -->\n    <div style=\"display:flex; align-items:center; gap:9px; margin-top:18px; min-height:22px;\">\n      <span style=\"width:9px; height:9px; border-radius:50%; background:{{ dotColor }}; box-shadow:0 0 0 4px {{ dotHalo }};\"><\u002Fspan>\n      <span style=\"font-size:14px; font-weight:600; color:#1b2730;\">{{ stepText }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Step progress -->\n    <div style=\"display:flex; align-items:center; gap:0; margin-top:14px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; flex:0 0 auto;\">\n        <span style=\"width:26px; height:26px; border-radius:50%; background:{{ pill1bg }}; color:{{ pill1fg }}; border:1.5px solid {{ pill1bd }}; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; transition:all 0.3s ease;\">1<\u002Fspan>\n        <span style=\"font-size:13px; font-weight:600; color:{{ pill1tx }}; transition:color 0.3s ease;\">Click “More”<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1; height:2px; margin:0 12px; border-radius:2px; background:{{ connectorColor }}; transition:background 0.3s ease;\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px; flex:0 0 auto;\">\n        <span style=\"width:26px; height:26px; border-radius:50%; background:{{ pill2bg }}; color:{{ pill2fg }}; border:1.5px solid {{ pill2bd }}; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; transition:all 0.3s ease;\">2<\u002Fspan>\n        <span style=\"font-size:13px; font-weight:600; color:{{ pill2tx }}; transition:color 0.3s ease;\">Save to PDF<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Mode controls -->\n    <div style=\"display:flex; align-items:center; gap:10px; margin-top:20px;\">\n      <div style=\"display:inline-flex; padding:4px; background:#f0f1f3; border-radius:12px; gap:4px;\">\n        <button onclick=\"{{ setAuto }}\" style=\"display:inline-flex; align-items:center; gap:7px; height:36px; padding:0 16px; border:none; border-radius:9px; background:{{ autoBg }}; color:{{ autoFg }}; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:{{ autoShadow }}; transition:all 0.2s ease;\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 5v14l11-7z\"><\u002Fpath><\u002Fsvg>\n          Watch\n        <\u002Fbutton>\n        <button onclick=\"{{ setManual }}\" style=\"display:inline-flex; align-items:center; gap:7px; height:36px; padding:0 16px; border:none; border-radius:9px; background:{{ manualBg }}; color:{{ manualFg }}; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:{{ manualShadow }}; transition:all 0.2s ease;\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 11l3 3 8-8M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9\"><\u002Fpath><\u002Fsvg>\n          Try it yourself\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <span style=\"font-size:12px; color:#8a96a0;\">{{ hint }}<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:780},&quot;speed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Calm&quot;,&quot;Normal&quot;,&quot;Quick&quot;],&quot;default&quot;:&quot;Normal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;manual&quot;],&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    mode: 'auto',\n    step: 0,\n    cx: 360, cy: 430,\n    cursorVisible: false,\n    cursorScale: 1,\n    dropdownOpen: false,\n    dropdownTop: 250,\n    dropdownLeft: 200,\n    hoverSave: false,\n    downloading: false,\n    success: false,\n  };\n\n  _timers = [];\n  cancelled = false;\n  _mode = 'auto';\n\n  componentDidMount() {\n    this._mode = this.props.startMode === 'manual' ? 'manual' : 'auto';\n    this.setState({ mode: this._mode });\n    if (this._mode === 'auto') this.runAuto();\n    else this.manualSetup();\n  }\n  componentWillUnmount() { this.stop(); }\n\n  stop() {\n    this.cancelled = true;\n    this._timers.forEach(clearTimeout);\n    this._timers = [];\n  }\n\n  factor() {\n    const s = this.props.speed;\n    if (s === 'Calm') return 1.35;\n    if (s === 'Quick') return 0.7;\n    return 1;\n  }\n  wait(ms) {\n    return new Promise(r => {\n      const id = setTimeout(r, ms * this.factor());\n      this._timers.push(id);\n    });\n  }\n  guard() { return this.cancelled || this._mode !== 'auto'; }\n\n  setFrameRef = n => { this.frameNode = n; };\n  setCardRef = n => { this.cardNode = n; };\n  setMoreRef = n => { this.moreNode = n; };\n  setSaveRef = n => { this.saveNode = n; };\n\n  centerIn(node, base) {\n    if (!node || !base) return null;\n    const b = base.getBoundingClientRect();\n    const r = node.getBoundingClientRect();\n    return { x: r.left - b.left + r.width / 2, y: r.top - b.top + r.height / 2 };\n  }\n\n  openDropdown() {\n    let top = 250, left = 200;\n    if (this.moreNode && this.frameNode) {\n      const f = this.frameNode.getBoundingClientRect();\n      const r = this.moreNode.getBoundingClientRect();\n      top = r.bottom - f.top + 8;\n      left = Math.max(8, r.right - f.left - 248);\n    }\n    this.setState({ dropdownOpen: true, dropdownTop: top, dropdownLeft: left });\n  }\n\n  resetAuto() {\n    let cx = 360, cy = 430;\n    if (this.frameNode) { cx = this.frameNode.clientWidth * 0.74; cy = this.frameNode.clientHeight * 0.88; }\n    this.setState({ step: 0, dropdownOpen: false, hoverSave: false, downloading: false, success: false, cursorScale: 1, cursorVisible: true, cx, cy });\n  }\n\n  async runAuto() {\n    this.cancelled = false;\n    try {\n      while (!this.guard()) {\n        this.resetAuto();\n        await this.wait(850); if (this.guard()) return;\n\n        this.setState({ step: 1 });\n        const m = this.centerIn(this.moreNode, this.frameNode);\n        if (m) this.setState({ cx: m.x, cy: m.y });\n        await this.wait(1000); if (this.guard()) return;\n\n        this.setState({ cursorScale: 0.78 });\n        await this.wait(150); if (this.guard()) return;\n        this.setState({ cursorScale: 1 });\n        this.openDropdown();\n        await this.wait(620); if (this.guard()) return;\n\n        this.setState({ step: 2 });\n        const s = this.centerIn(this.saveNode, this.frameNode);\n        if (s) this.setState({ cx: s.x, cy: s.y });\n        await this.wait(540); if (this.guard()) return;\n        this.setState({ hoverSave: true });\n        await this.wait(520); if (this.guard()) return;\n\n        this.setState({ cursorScale: 0.78 });\n        await this.wait(150); if (this.guard()) return;\n        this.setState({ cursorScale: 1 });\n\n        this.setState({ step: 3, downloading: true });\n        await this.wait(1200); if (this.guard()) return;\n        this.setState({ success: true });\n        await this.wait(1700); if (this.guard()) return;\n\n        this.setState({ dropdownOpen: false, hoverSave: false });\n        await this.wait(800); if (this.guard()) return;\n      }\n    } catch (e) {}\n  }\n\n  manualSetup() {\n    this.setState({ step: 1, dropdownOpen: false, hoverSave: false, downloading: false, success: false, cursorVisible: false });\n  }\n\n  setAuto = () => {\n    if (this._mode === 'auto') return;\n    this.stop();\n    this._mode = 'auto';\n    this.setState({ mode: 'auto' });\n    this.runAuto();\n  };\n  setManual = () => {\n    if (this._mode === 'manual') return;\n    this.stop();\n    this.cancelled = false;\n    this._mode = 'manual';\n    this.setState({ mode: 'manual' });\n    this.manualSetup();\n  };\n\n  onMore = () => {\n    if (this._mode !== 'manual') return;\n    if (this.state.dropdownOpen) this.setState({ dropdownOpen: false, step: 1 });\n    else { this.openDropdown(); this.setState({ step: 2 }); }\n  };\n  onSaveEnter = () => { if (this._mode === 'manual') this.setState({ hoverSave: true }); };\n  onSaveLeave = () => { if (this._mode === 'manual') this.setState({ hoverSave: false }); };\n  onSave = async () => {\n    if (this._mode !== 'manual') return;\n    this.setState({ step: 3, downloading: true, hoverSave: false });\n    await this.wait(1200);\n    if (this._mode !== 'manual') return;\n    this.setState({ success: true });\n    await this.wait(2000);\n    if (this._mode !== 'manual') return;\n    this.setState({ downloading: false, success: false, dropdownOpen: false, step: 1 });\n  };\n\n  renderVals() {\n    const st = this.state;\n    const blue = '#0a66c2';\n    const idleBd = '#d5d9dd', idleTx = '#9aa3ab';\n\n    const step = st.step;\n    let stepText;\n    if (st.mode === 'manual' && step <= 1 && !st.downloading) stepText = 'Click “More” to open the menu';\n    else if (step <= 0) stepText = 'Starting…';\n    else if (step === 1) stepText = 'Click the “More” button';\n    else if (step === 2) stepText = 'Choose “Save to PDF”';\n    else stepText = st.success ? 'Saved as PDF — ready to import' : 'Saving as PDF…';\n\n    const p1active = step >= 1, p1done = step >= 2;\n    const p2active = step >= 2, p2done = st.success;\n\n    const dotColor = st.success ? '#1f9d57' : (step >= 1 ? blue : '#b6bec5');\n    const dotHalo = st.success ? 'rgba(31,157,87,0.14)' : (step >= 1 ? 'rgba(10,102,194,0.14)' : 'rgba(160,170,180,0.14)');\n\n    const auto = st.mode === 'auto';\n\n    return {\n      stepText,\n      // status dot\n      dotColor, dotHalo,\n      // step 1 pill\n      pill1bg: p1done ? blue : (p1active ? '#eaf2fb' : '#fff'),\n      pill1fg: p1done ? '#fff' : (p1active ? blue : idleTx),\n      pill1bd: p1active ? blue : idleBd,\n      pill1tx: p1active ? '#1b2730' : idleTx,\n      // step 2 pill\n      pill2bg: p2done ? blue : (p2active ? '#eaf2fb' : '#fff'),\n      pill2fg: p2done ? '#fff' : (p2active ? blue : idleTx),\n      pill2bd: p2active ? blue : idleBd,\n      pill2tx: p2active ? '#1b2730' : idleTx,\n      connectorColor: step >= 2 ? blue : idleBd,\n      // dropdown\n      dropdownOpen: st.dropdownOpen,\n      dropdownTop: st.dropdownTop,\n      dropdownLeft: st.dropdownLeft,\n      saveBg: st.hoverSave ? '#eef3f8' : '#fff',\n      // cursor\n      cx: st.cx, cy: st.cy, cursorScale: st.cursorScale,\n      cursorOpacity: (auto && st.cursorVisible) ? 1 : 0,\n      // toast\n      toastVisible: st.downloading,\n      success: st.success,\n      ringOffset: st.downloading ? 0 : 100.5,\n      toastTitle: st.success ? 'Profile saved as PDF' : 'Generating PDF…',\n      // controls\n      setAuto: this.setAuto, setManual: this.setManual,\n      onMore: this.onMore, onSave: this.onSave,\n      onSaveEnter: this.onSaveEnter, onSaveLeave: this.onSaveLeave,\n      setFrameRef: this.setFrameRef, setCardRef: this.setCardRef,\n      setMoreRef: this.setMoreRef, setSaveRef: this.setSaveRef,\n      autoBg: auto ? '#fff' : 'transparent',\n      autoFg: auto ? blue : '#6a7884',\n      autoShadow: auto ? '0 1px 3px rgba(20,30,45,0.12)' : 'none',\n      manualBg: !auto ? '#fff' : 'transparent',\n      manualFg: !auto ? blue : '#6a7884',\n      manualShadow: !auto ? '0 1px 3px rgba(20,30,45,0.12)' : 'none',\n      hint: auto ? 'Auto-playing · loops' : 'Click the buttons to progress',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Export Profile Animation.dc"}
